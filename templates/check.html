{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Contrôle : {{ hebergement.emplacement }}</h2>
    
    <form method="POST" id="checkForm" enctype="multipart/form-data">
        <!-- Tes champs actuels (Électricité, Plomberie, etc.) -->
        <div class="card mb-4">
            <div class="card-body">
                {% for field in ['electricite', 'plomberie', 'chauffage', 'proprete', 'equipements'] %}
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="{{ field }}" id="{{ field }}" checked>
                    <label class="form-check-label" for="{{ field }}">{{ field|capitalize }} OK ?</label>
                </div>
                {% endfor %}
                
                <div class="mb-3">
                    <label class="form-label">Observations :</label>
                    <textarea class="form-control" name="observations" rows="3"></textarea>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="probleme_critique" id="probleme_critique">
                    <label class="form-check-label text-danger fw-bold" for="probleme_critique">🚨 PROBLÈME CRITIQUE</label>
                </div>
            </div>
        </div>

        <!-- ZONE DE SIGNATURE -->
        <div class="card mb-4 border-primary">
            <div class="card-header bg-primary text-white">✍️ Signature du technicien</div>
            <div class="card-body text-center">
                <canvas id="signature-pad" class="border rounded bg-light" style="width: 100%; height: 200px; touch-action: none;"></canvas>
                <div class="mt-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="clear-signature">Effacer</button>
                </div>
                <input type="hidden" name="signature_data" id="signature_data">
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100">Envoyer le rapport</button>
    </form>
</div>

<!-- Script pour gérer le tracé de la signature -->
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script>
    const canvas = document.querySelector("canvas");
    const signaturePad = new SignaturePad(canvas);
    const form = document.getElementById("checkForm");

    // Redimensionner le canvas proprement
    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // Effacer
    document.getElementById('clear-signature').addEventListener('click', () => {
        signaturePad.clear();
    });

    // Avant d'envoyer, on met l'image de la signature dans le champ caché
    form.addEventListener('submit', (e) => {
        if (signaturePad.isEmpty()) {
            alert("Merci de signer avant d'envoyer le rapport.");
            e.preventDefault();
        } else {
            const dataUrl = signaturePad.toDataURL();
            document.getElementById('signature_data').value = dataUrl;
        }
    });
</script>
{% endblock %}
